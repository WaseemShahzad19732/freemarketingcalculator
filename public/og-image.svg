<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f38"/>
      <stop offset="100%" style="stop-color:#1a3358"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative teal bars (bar chart motif) -->
  <rect x="900" y="200" width="50" height="380" rx="6" fill="#00C4B3" opacity="0.15"/>
  <rect x="970" y="120" width="50" height="460" rx="6" fill="#00C4B3" opacity="0.10"/>
  <rect x="1040" y="280" width="50" height="300" rx="6" fill="#00C4B3" opacity="0.08"/>
  <rect x="1110" y="160" width="50" height="420" rx="6" fill="#00C4B3" opacity="0.06"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="12" fill="#00C4B3"/>
  <rect x="92" y="126" width="12" height="18" rx="2" fill="white"/>
  <rect x="108" y="114" width="12" height="30" rx="2" fill="white" opacity="0.85"/>
  <rect x="124" y="100" width="12" height="44" rx="2" fill="white"/>
  <polyline points="98,124 114,112 130,98 142,90" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Brand name -->
  <text x="168" y="108" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="white" letter-spacing="-0.5">Free</text>
  <text x="216" y="108" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#00C4B3" letter-spacing="-0.5">Marketing</text>
  <text x="168" y="138" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="white" letter-spacing="-0.5">Calculators</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="-2">Free Marketing</text>
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#00C4B3" letter-spacing="-2">Calculators</text>

  <!-- Subtext -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.7)" letter-spacing="0">ROI · Budget · CPM · Salary · Conversion Rate · Agency Valuation</text>

  <!-- Features row -->
  <rect x="80" y="460" width="200" height="44" rx="22" fill="rgba(0,196,179,0.15)" stroke="#00C4B3" stroke-width="1.5"/>
  <text x="180" y="487" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00C4B3" text-anchor="middle">✓ 13 free tools</text>

  <rect x="300" y="460" width="220" height="44" rx="22" fill="rgba(0,196,179,0.15)" stroke="#00C4B3" stroke-width="1.5"/>
  <text x="410" y="487" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00C4B3" text-anchor="middle">✓ No signup required</text>

  <rect x="540" y="460" width="220" height="44" rx="22" fill="rgba(0,196,179,0.15)" stroke="#00C4B3" stroke-width="1.5"/>
  <text x="650" y="487" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00C4B3" text-anchor="middle">✓ Updated July 2026</text>

  <!-- Domain -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" letter-spacing="0">freemarketingcalculator.com</text>
</svg>